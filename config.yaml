paths:
  input: ./input
  output: ./output
  logs: ./logs
  processed_tracking: ./processed.json

watcher:
  stability_wait_seconds: 10
  supported_extensions:
    - .mkv
    - .mp4
    - .avi
    - .mov
    - .mp3
    - .wav
  ignore_prefixes:
    - "~"
    - "."
    - "_"
  ignore_extensions:
    - .tmp
    - .part
    - .crdownload

whisper:
  model: large-v3
  language: null  # null = auto-detect language (handles Italian, English, and others)
  device: auto    # auto = use GPU if available, otherwise CPU | force with: cpu, cuda

ollama:
  base_url: http://localhost:11434
  model: qwen2.5-coder:latest
  retry_attempts: 3
  retry_backoff_seconds:
    - 5
    - 15
    - 30
